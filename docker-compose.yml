services:
  postgres:
    image: postgres:16-alpine
    container_name: orizon-distribuidora-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orizon_distribuidora}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - orizon_distribuidora_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-orizon_distribuidora}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  orizon_distribuidora_postgres_data:
